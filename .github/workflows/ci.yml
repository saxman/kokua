name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Mopai needs AIMU features not yet on PyPI, so install AIMU from main first.
      # The bare `aimu` dependency in pyproject is then already satisfied.
      - name: Install AIMU from main
        run: pip install "aimu @ git+https://github.com/saxman/aimu@main"
      - name: Install Mopai (dev + web)
        run: pip install -e '.[dev,web]'
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest -q
