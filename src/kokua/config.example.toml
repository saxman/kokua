# Kokua configuration. Run `kokua config init` to write this to $KOKUA_HOME/config.toml (default
# ~/.kokua/config.toml), copy it there yourself, or point at it with --config PATH or $KOKUA_CONFIG.
# Every key is optional; the value shown is the built-in default. Command-line flags override anything
# set here. Unknown keys are ignored with a warning.

[assistant]
# Model string, e.g. "anthropic:claude-sonnet-4-6". Unset -> $AIMU_LANGUAGE_MODEL / a local model.
# model = "anthropic:claude-sonnet-4-6"

# system_message = "You are a personal assistant running on the user's own machine. ..."

# Send a proactive reminder this many seconds after startup. Unset -> no reminder.
# reminder_seconds = 1800.0
# reminder_text = "Proactively check in with the user with one short, useful suggestion for their day."

# Persistent memory across conversations (facts + user documents).
memory = true

# Discover tool-pack plugins via the "kokua.tools" entry-point group.
load_plugins = true

# Let the assistant delegate independent subtasks to fresh, isolated sub-agents (spawn_subagent tool).
subagents = true

[display]
# Stream the model's reasoning / tool calls into the channel. The web settings panel toggles these
# at runtime; a change there persists to data/runtime-settings.json and overrides these defaults.
show_thinking = true
show_tools = true

[tools]
# AIMU built-in tool groups to expose. Also accepts ["all"] or ["none"]. The generative groups
# (image, audio, speech, transcription) require their AIMU_*_MODEL env var.
groups = ["web", "fs", "compute", "misc"]

# Images: the assistant reads images you attach (web upload / paste, or the CLI `/attach <path>`
# command); a vision-capable model is needed (Claude models qualify). It can also generate images when
# the AIMU_IMAGE_MODEL env var is set (e.g. "gemini:nano-banana" or a HuggingFace diffusers "hf:<repo>");
# without it, no image-generation tool is offered. Uploaded and generated images are stored under
# data/images and served by the web UI at /images; sessions keep only a small reference, not inline data.

[subagents]
# Run independent tool calls in one turn concurrently, so several spawn_subagent calls overlap.
concurrent = true

# Sub-agent roles the model can pick via spawn_subagent(agent_type, task). These merge over the
# built-in defaults (researcher, coder, generalist) by name: reuse a name to override it, or add a
# new name. Each role's tools are its groups intersected with [tools] groups above, so a role can
# narrow within the enabled tools but never exceed them. `system_message` is optional.
# [subagents.roles.researcher]
# description = "Research specialist: gather and verify information from the web."
# groups = ["web", "misc"]
# [subagents.roles.dba]
# description = "Database helper."
# groups = ["compute"]
# system_message = "You manage and query databases."

[mcp]
# Remote MCP server URLs to connect at startup.
servers = []
# Bearer token applied to all servers above that require authentication.
# bearer = "..."

[security]
# Tools that require interactive confirmation before each call (terminal y/N, or Allow/Deny in the
# web UI). These run with full machine access. Set to [] to disable approval. Proactive (unprompted)
# turns auto-deny these regardless.
confirm_tools = ["add_skill_script", "add_mcp_server", "execute_python"]

[paths]
# Absolute override for where all transient + user content lives. Default: $KOKUA_HOME/data.
# data_dir = "/path/to/kokua-data"

[frontend]
# Which front end `kokua` runs: "cli", "web", or any installed plugin.
name = "cli"

[web]
# Bind address for the web front end (ignored by other front ends).
host = "127.0.0.1"
port = 8000

[planning]
# Deep planning is invoked per request -- the web UI's Plan toggle, or a "/plan <task>" message -- and
# drafts an explicit plan (which tools/skills/MCP services to use or build) before doing the work.
# plan_review pauses that planned turn for your Approve/Edit/Reject; off runs the plan autonomously.
# plan_review is toggleable at runtime in the web settings panel.
# plan_review = false
# Adversarial review (both off by default). plan_review_agent: an independent, context-free agent critiques
# the plan and Kokua re-plans on rejection. result_review: an independent agent checks the final answer
# before it is shown -- this runs the answer non-streamed -- and Kokua revises on rejection. review_rounds
# bounds each replan/revise loop.
# plan_review_agent = false
# result_review = false
# review_rounds = 2
# Verbose trace: stream every LLM call in a planned turn (planner, each reviewer's prose reasoning +
# verdict, executor, every revision) under labeled phase headers, showing each intermediate version.
# Overrides result_review's "hide until vetted" gate. Off by default.
# show_reasoning = false

[generation]
# Baseline model generation kwargs. The web settings panel overrides these at runtime and persists
# its own choice separately (to data/runtime-settings.json), so these act only as the starting
# defaults. Provider support varies: AIMU forces temperature and drops top_p/top_k for thinking
# models, and Anthropic does not support presence_penalty / repetition_penalty (OpenAI-family keys).
# Unset keys fall back to the provider's built-in default.
# temperature = 0.1
# max_tokens = 1024
# top_p = 1.0
# top_k = 40
# presence_penalty = 0.0
# repetition_penalty = 1.0
