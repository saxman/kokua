<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kokua</title>
  <!-- Resolve the theme before first paint (stored choice, else OS preference) to avoid a flash. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var dark = stored ? stored === "dark" : window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {}
    })();
  </script>
  <style>
    /* Light theme (default). The dark override below only changes these variables. */
    :root {
      color-scheme: light;
      --bg: #f5f5f7; --fg: #111;
      --header-bg: #1f2937; --header-fg: #fff;
      --surface: #fff; --border: #e5e7eb;
      --accent: #2563eb; --accent-fg: #fff;
      --proactive-bg: #fef3c7; --proactive-border: #f59e0b;
      --thinking-fg: #6b7280; --thinking-border: #d1d5db;
      --tool-fg: #92400e; --tool-bg: #fffbeb; --tool-border: #fde68a;
      --approval-bg: #fff7ed; --approval-border: #fdba74;
      --code-bg: #f3f4f6; --quote-fg: #4b5563; --quote-border: #d1d5db;
      --muted: #6b7280;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1419; --fg: #e5e7eb;
      --header-bg: #111827; --header-fg: #f9fafb;
      --surface: #1b212b; --border: #374151;
      --accent: #3b82f6; --accent-fg: #fff;
      --proactive-bg: #3a2f12; --proactive-border: #b45309;
      --thinking-fg: #9ca3af; --thinking-border: #4b5563;
      --tool-fg: #fbbf24; --tool-bg: #241d10; --tool-border: #78350f;
      --approval-bg: #2a2012; --approval-border: #b45309;
      --code-bg: #0b0e13; --quote-fg: #9ca3af; --quote-border: #4b5563;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      background: var(--bg); color: var(--fg);
    }
    header { padding: 12px 16px; background: var(--header-bg); color: var(--header-fg); font-weight: 600;
      display: flex; align-items: center; justify-content: space-between; }
    header small { font-weight: 400; opacity: 0.7; margin-left: 8px; }
    #theme { background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); color: var(--header-fg);
      border-radius: 8px; padding: 4px 10px; font-size: 1em; line-height: 1; cursor: pointer; }
    #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; line-height: 1.4; }
    .user { align-self: flex-end; background: var(--accent); color: var(--accent-fg); border-bottom-right-radius: 4px; }
    .assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .proactive { align-self: flex-start; background: var(--proactive-bg); border: 1px solid var(--proactive-border); }
    .proactive::before { content: "proactive "; font-size: 0.7em; text-transform: uppercase; opacity: 0.6; letter-spacing: 0.05em; }
    .notice { align-self: center; font-size: 0.85em; opacity: 0.6; }
    .thinking {
      align-self: flex-start; max-width: 70%; font-size: 0.85em; font-style: italic;
      color: var(--thinking-fg); background: transparent; border-left: 2px solid var(--thinking-border); padding: 2px 10px; white-space: pre-wrap;
    }
    .thinking::before { content: "thinking"; display: block; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.05em; font-style: normal; opacity: 0.7; }
    .tool { align-self: flex-start; font-family: ui-monospace, monospace; font-size: 0.8em; color: var(--tool-fg); background: var(--tool-bg); border: 1px solid var(--tool-border); border-radius: 8px; padding: 4px 10px; }
    .tool::before { content: "\1F527  "; }
    /* Markdown-rendered bubbles: real block elements, so drop the plain-text pre-wrap. */
    .md { white-space: normal; }
    .md > :first-child { margin-top: 0; }
    .md > :last-child { margin-bottom: 0; }
    .md p { margin: 0.5em 0; }
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 { margin: 0.6em 0 0.3em; line-height: 1.25; }
    .md h1 { font-size: 1.4em; } .md h2 { font-size: 1.25em; } .md h3 { font-size: 1.1em; }
    .md ul, .md ol { margin: 0.4em 0; padding-left: 1.4em; }
    .md li { margin: 0.15em 0; }
    .md code { font-family: ui-monospace, monospace; font-size: 0.9em; background: var(--code-bg); padding: 0.1em 0.3em; border-radius: 4px; }
    .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; overflow-x: auto; }
    .md pre code { background: none; padding: 0; }
    .md blockquote { margin: 0.5em 0; padding-left: 0.8em; border-left: 3px solid var(--quote-border); color: var(--quote-fg); }
    .md a { color: var(--accent); }
    .approval { align-self: flex-start; max-width: 70%; background: var(--approval-bg); border: 1px solid var(--approval-border); border-radius: 12px; padding: 10px 14px; }
    .approval .prompt { font-size: 0.9em; margin-bottom: 8px; }
    .approval code { font-family: ui-monospace, monospace; font-size: 0.85em; }
    .approval .actions { display: flex; gap: 8px; }
    .approval button { padding: 6px 14px; font-size: 0.85em; }
    .approval button.deny { background: var(--muted); }
    form { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); }
    #msg { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 1em; background: var(--surface); color: var(--fg); }
    button { padding: 10px 18px; border: none; border-radius: 10px; background: var(--accent); color: var(--accent-fg); font-size: 1em; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <span>Kokua <small>local, single user</small></span>
    <button id="theme" type="button">🌙</button>
  </header>
  <div id="log"></div>
  <form id="form">
    <input id="msg" autocomplete="off" placeholder="Message your assistant..." autofocus />
    <button id="send" type="submit">Send</button>
    <button id="stop" type="button" disabled>Stop</button>
  </form>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("send");
    const stopBtn = document.getElementById("stop");
    const themeBtn = document.getElementById("theme");

    // The theme was applied pre-paint by the head script; here we wire the toggle and its label.
    function syncThemeButton() {
      const dark = document.documentElement.getAttribute("data-theme") === "dark";
      themeBtn.textContent = dark ? "☀️" : "🌙";
      themeBtn.title = dark ? "Switch to light theme" : "Switch to dark theme";
    }
    syncThemeButton();
    themeBtn.addEventListener("click", () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem("theme", next); } catch (e) {}
      syncThemeButton();
    });

    let streamingBubble = null;  // the assistant answer bubble accumulating tokens
    let streamingText = "";      // raw answer text, re-rendered as markdown when the turn completes
    let thinkingBlock = null;    // the reasoning block accumulating THINKING tokens

    // Stop is only meaningful while a reactive turn is being processed: enabled when the user sends,
    // disabled when the turn ends (a `done` frame, or a non-proactive `message` for "(stopped)"/errors).
    function setProcessing(active) {
      stopBtn.disabled = !active;
    }

    function addBubble(cls, text) {
      const el = document.createElement("div");
      el.className = "bubble " + cls;
      el.textContent = text || "";
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    function notice(text) { addBubble("notice", text); }

    // --- Minimal, safe markdown rendering -----------------------------------------------------
    // The assistant (and tool output) is untrusted, so HTML-escape everything FIRST, then add only
    // a known set of tags. Raw HTML in the source can never reach the DOM as markup.
    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderInline(text) {
      // `text` is already HTML-escaped. Split out `code spans` so inline rules skip their contents.
      return text.split(/(`[^`]+`)/).map((part) => {
        if (part.length >= 2 && part.startsWith("`") && part.endsWith("`")) {
          return "<code>" + part.slice(1, -1) + "</code>";
        }
        let s = part;
        // [label](url): only http(s)/mailto. The url is escaped, so undo &amp; before the scheme test.
        s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, label, url) => {
          if (/^(https?:\/\/|mailto:)/i.test(url.replace(/&amp;/g, "&"))) {
            return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
          }
          return m;  // unsafe scheme: leave as literal text
        });
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>");
        s = s.replace(/(^|[^\w])_([^_\s][^_]*?)_/g, "$1<em>$2</em>");
        return s;
      }).join("");
    }

    function renderMarkdown(src) {
      const lines = escapeHtml(src).split("\n");
      // Lines are already HTML-escaped, so a blockquote marker is "&gt;", not ">".
      const special = /^(#{1,6}\s|&gt;\s?|```|\s*[-*+]\s+|\s*\d+\.\s+)/;
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        let m;
        if (/^```/.test(line)) {
          const code = [];
          i++;
          while (i < lines.length && !/^```\s*$/.test(lines[i])) { code.push(lines[i]); i++; }
          i++;  // skip the closing fence
          blocks.push("<pre><code>" + code.join("\n") + "</code></pre>");
        } else if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
          blocks.push(`<h${m[1].length}>${renderInline(m[2])}</h${m[1].length}>`);
          i++;
        } else if (/^&gt;\s?/.test(line)) {
          const quote = [];
          while (i < lines.length && /^&gt;\s?/.test(lines[i])) { quote.push(lines[i].replace(/^&gt;\s?/, "")); i++; }
          blocks.push("<blockquote>" + renderInline(quote.join(" ")) + "</blockquote>");
        } else if (/^\s*[-*+]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
            items.push("<li>" + renderInline(lines[i].replace(/^\s*[-*+]\s+/, "")) + "</li>"); i++;
          }
          blocks.push("<ul>" + items.join("") + "</ul>");
        } else if (/^\s*\d+\.\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
            items.push("<li>" + renderInline(lines[i].replace(/^\s*\d+\.\s+/, "")) + "</li>"); i++;
          }
          blocks.push("<ol>" + items.join("") + "</ol>");
        } else if (line.trim() === "") {
          i++;
        } else {
          const para = [];
          while (i < lines.length && lines[i].trim() !== "" && !special.test(lines[i])) { para.push(lines[i]); i++; }
          blocks.push("<p>" + renderInline(para.join(" ")) + "</p>");
        }
      }
      return blocks.join("\n");
    }

    function addMarkdownBubble(cls, text) {
      const el = document.createElement("div");
      el.className = "bubble md " + cls;
      el.innerHTML = renderMarkdown(text || "");
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws`);

    function toolLine(name, args) {
      let argStr = "";
      if (args && typeof args === "object") {
        argStr = Object.entries(args).map(([k, v]) => `${k}=${JSON.stringify(v)}`).join(", ");
      } else if (args != null) {
        argStr = String(args);
      }
      return `${name || "tool"}(${argStr})`;
    }

    ws.onmessage = (event) => {
      const frame = JSON.parse(event.data);
      // Blocks are appended in arrival order (thinking -> tool -> answer, possibly several
      // rounds per turn). A tool call or answer token closes any open thinking block.
      if (frame.type === "thinking") {
        if (!thinkingBlock) thinkingBlock = addBubble("thinking", "");
        thinkingBlock.appendChild(document.createTextNode(frame.text));
        log.scrollTop = log.scrollHeight;
      } else if (frame.type === "tool") {
        thinkingBlock = null;
        addBubble("tool", toolLine(frame.name, frame.arguments));
      } else if (frame.type === "token") {
        thinkingBlock = null;
        if (!streamingBubble) {
          streamingBubble = addBubble("assistant", "");
          streamingText = "";
        } else if (log.lastElementChild !== streamingBubble) {
          // New answer content after an intervening thinking/tool block: float the answer
          // to the bottom so it never sits above later reasoning.
          log.appendChild(streamingBubble);  // moves the existing node to the end
        }
        // Stream as plain text; partial markdown can't be rendered until the turn finishes.
        streamingText += frame.text;
        streamingBubble.textContent = streamingText;
        log.scrollTop = log.scrollHeight;
      } else if (frame.type === "done") {
        if (streamingBubble) {
          streamingBubble.classList.add("md");
          streamingBubble.innerHTML = renderMarkdown(streamingText);
          log.scrollTop = log.scrollHeight;
        }
        streamingBubble = null;
        thinkingBlock = null;
        setProcessing(false);
      } else if (frame.type === "message") {
        addMarkdownBubble(frame.proactive ? "proactive" : "assistant", frame.text);
        if (!frame.proactive) setProcessing(false);  // a reactive message ends the turn (e.g. "(stopped)" / error)
      } else if (frame.type === "approval") {
        renderApproval(frame.name, frame.arguments);
      } else if (frame.type === "history") {
        // Replay the prior conversation on (re)connect, reusing the live renderers.
        for (const item of frame.items) {
          if (item.type === "user") addBubble("user", item.text);
          else if (item.type === "thinking") addBubble("thinking", item.text);
          else if (item.type === "tool") addBubble("tool", toolLine(item.name, item.arguments));
          else if (item.type === "message") addMarkdownBubble(item.proactive ? "proactive" : "assistant", item.text);
        }
        log.scrollTop = log.scrollHeight;
      }
    };

    // A gated tool needs confirmation: show the call and Allow/Deny buttons. The reply is a plain
    // "y"/"n" frame, which the server routes to the waiting tool call (same path as typing it).
    function renderApproval(name, args) {
      const el = document.createElement("div");
      el.className = "bubble approval";
      const prompt = document.createElement("div");
      prompt.className = "prompt";
      prompt.textContent = "Allow ";
      const code = document.createElement("code");
      code.textContent = toolLine(name, args);
      prompt.appendChild(code);
      prompt.appendChild(document.createTextNode("?"));
      const actions = document.createElement("div");
      actions.className = "actions";
      const answer = (reply) => {
        if (ws.readyState === WebSocket.OPEN) ws.send(reply);
        actions.querySelectorAll("button").forEach((b) => (b.disabled = true));
      };
      const allow = document.createElement("button");
      allow.textContent = "Allow";
      allow.addEventListener("click", () => answer("y"));
      const deny = document.createElement("button");
      deny.className = "deny";
      deny.textContent = "Deny";
      deny.addEventListener("click", () => answer("n"));
      actions.appendChild(allow);
      actions.appendChild(deny);
      el.appendChild(prompt);
      el.appendChild(actions);
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    ws.onopen = () => { input.disabled = false; sendBtn.disabled = false; input.focus(); };
    ws.onclose = () => {
      notice("Disconnected.");
      input.disabled = true; sendBtn.disabled = true;
      setProcessing(false);
    };

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      addBubble("user", text);
      ws.send(text);
      input.value = "";
      setProcessing(true);  // a turn is now being processed; allow stopping it
    });

    // Cancel the in-flight reply. Disabled unless a turn is processing; disable on click so it
    // can't be sent twice (the server's "(stopped)" message also clears the processing state).
    stopBtn.addEventListener("click", () => {
      if (ws.readyState === WebSocket.OPEN) ws.send("/stop");
      setProcessing(false);
    });
  </script>
</body>
</html>
